<!DOCTYPE html>
<html>
<head>

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{

background:white;

padding:30px;

border-radius:20px;

width:320px;

box-shadow:
0 10px 30px rgba(
0,
0,
0,
0.1);

}


input{

width:100%;

padding:14px;

margin-top:12px;

border-radius:10px;

border:
1px solid #ddd;

box-sizing:
border-box;

}


button{

width:100%;

padding:14px;

margin-top:15px;

background:#D4AF37;

color:white;

border:none;

border-radius:10px;

font-weight:bold;

}


.switch{

text-align:center;

margin-top:15px;

font-size:14px;

}


a{

color:#D4AF37;

text-decoration:none;

font-weight:bold;

}

</style>


<script>

function showLogin(){

document
.getElementById(
"signup"
)

.style.display=
"none";


document
.getElementById(
"login"
)

.style.display=
"block";

}



function showSignup(){

document
.getElementById(
"login"
)

.style.display=
"none";


document
.getElementById(
"signup"
)

.style.display=
"block";

}

</script>

</head>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<body>


<div class="box">


<div id="signup">

<h2>

Sign Up

</h2>


<form

method="POST"

action="/customer-signup">


<input
name="name"
placeholder="Name"
required>


<input
name="phone"
placeholder="Phone"
required>


<input
name="address"
placeholder="Address"
required>


<input
type="password"
name="pin"
placeholder="6 digit PIN"
pattern="[0-9]{6}"
minlength="6"
maxlength="6"
inputmode="numeric"
required>


<button>

Sign Up

</button>

</form>



<div class="switch">

Already have account?

<a

onclick="showLogin()"

href="#">

Login

</a>

</div>


</div>




<div

id="login"

style="display:none;">


<h2>

Login

</h2>


<form

method="POST"

action="/customer-login">


<input
name="phone"
placeholder="Phone"
required>


<input
type="password"
name="pin"
placeholder="PIN"
required>


<button>

Login

</button>

</form>



<div class="switch">

New user?

<a

onclick="showSignup()"

href="#">

Sign Up

</a>

</div>


</div>



</div>

</body>
</html>
