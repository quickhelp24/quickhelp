<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

.container{

display:flex;

gap:30px;

flex-wrap:wrap;

}


.left{

flex:2;

background:white;

padding:25px;

border-radius:20px;

box-shadow:
0 8px 20px rgba(
0,
0,
0,
0.08
);

}


.right{

flex:1;

background:
#fff8e1;

padding:20px;

border-radius:20px;

}


input,
button{

width:100%;

box-sizing:
border-box;

padding:14px;

margin-top:10px;

border-radius:12px;

border:
1px solid #ddd;

}


button{

background:

linear-gradient(
90deg,
#D4AF37,
#b88a00
);

color:white;

border:none;

font-weight:bold;

}

</style>
</head>

<body style="background:#f3f4f6;">

<h2>Complete Booking</h2>

<div class="container">

<div class="left">
<form method="POST" action="/submit" enctype="multipart/form-data">

<input type="hidden" name="option" value="{{option}}">




<label>Date</label>
<input type="date" name="date" id="dateInput" min="" required>
<script>
document.getElementById("dateInput").min =
new Date().toISOString().split("T")[0];
</script>

<label>Time</label>
<input type="time" name="time" id="timeInput" min="07:00" max="21:00" required>

<script>

var dateInput =
document.getElementById("dateInput");

var timeInput =
document.getElementById("timeInput");

timeInput.addEventListener(
"change",

function(){

var now =
new Date();

var today =
now.toISOString().split("T")[0];

var currentTime =
now.getHours().toString().padStart(2,'0')
+
":"
+
now.getMinutes().toString().padStart(2,'0');

if(
dateInput.value === today
&&
timeInput.value < currentTime
){

alert(
"Please select future time"
);

timeInput.value = "";

}

});

</script>
<button style="background:#16a34a; font-weight:bold;">Confirm Booking</button>


</form>
</div>

<div class="right">
<h3>Instructions</h3>
<p>Select time at least 1 hour later</p>
</div>

</div>

</body>
</html>
