<script>
function toggleChat() {
  const chat = document.getElementById("chatContainer");
  chat.style.display = chat.style.display === "none" ? "block" : "none";
}

function sendMessage() {
    const input = document.getElementById("userInput");
    const msg = input.value.toLowerCase();
    const chat = document.getElementById("chatMessages");

    if(msg === "") return;

    chat.innerHTML += `<div class="user">${msg}</div>`;

    let reply = "";

    if(msg.includes("price")) {
        reply = "Cleaning starts from ₹200, cooking from ₹300.";
    }
    else if(msg.includes("book")) {
        reply = "Select service → Buy Now → Fill details → Pay ₹100.";
    }
    else if(msg.includes("contact")) {
        reply = "Contact 9980156144.";
    }
    else {
        reply = "Ask about price, booking or contact 😊";
    }

    chat.innerHTML += `<div class="bot">${reply}</div>`;

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>
